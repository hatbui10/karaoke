<!DOCTYPE html>
<html lang="vi">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk Karaoke Sync Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030305;
    color:white;
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

/* Đúng quy tắc bố cục bắt buộc: Cách mép trên 30px, cách hai bên biên 3px */
.app{
    width: calc(100% - 6px);
    margin-top: 30px;
    margin-left: 3px;
    margin-right: 3px;
    max-width:520px;
}

.panel{
    background:rgba(10,10,15,.95);
    border:1px solid #00e5ff;
    border-radius:10px;
    padding:15px;
    box-shadow:0 0 20px rgba(0,229,255,.15);
    margin-bottom:15px;
}

.title{
    text-align:center;
    color:#00e5ff;
    font-size:18px;
    font-weight:900;
    letter-spacing:3px;
    margin-bottom:15px;
    text-shadow:0 0 12px #00e5ff;
}

.upload{
    position:relative;
    margin-bottom:10px;
}

.upload label{
    display:block;
    width:100%;
    padding:14px;
    text-align:center;
    border:2px dashed #ff007f;
    border-radius:8px;
    cursor:pointer;
    color:#ff007f;
    font-weight:700;
    transition:.3s;
}

.upload label:hover{
    background:#ff007f;
    color:black;
    box-shadow:0 0 20px #ff007f;
}

.upload input{
    position:absolute;
    inset:0;
    opacity:0;
    cursor:pointer;
}

.status{
    text-align:center;
    color:#888;
    font-size:14px;
    margin-bottom:12px;
}

audio{
    width:100%;
}

/* Khung hiển thị lời dạng Textarea cố định chiều cao */
.textarea-container {
    width: 100%;
    height: 250px; 
    background: rgba(5,5,8,.98);
    border: 2px solid #ff007f;
    border-radius: 10px;
    padding: 0 20px; 
    overflow: hidden; 
    box-shadow: 0 0 25px rgba(255,0,127,.15);
    position: relative;
}

.lyrics-content {
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: absolute;
    width: calc(100% - 40px);
    left: 20px;
    top: 0;
    will-change: transform;
}

.lyric-line{
    text-align:center; 
    line-height: 1.4;
    width: 100%;
    min-height: 36px;
    opacity: 0.2; 
    transition: opacity 0.3s ease, transform 0.3s ease;
    transform: scale(0.95);
}

/* Dòng đang hát: Sáng rõ và phóng to làm tiêu điểm ở chính giữa */
.lyric-line.active-line {
    opacity: 1;
    transform: scale(1.05);
}

.lyric-word{
    display:inline-block;
    margin: 0 4px;
    font-size:24px;
    font-weight:900;
    color:rgba(255,255,255,0.4); 
    transition:.05s linear;
    text-transform:uppercase;
}

/* Bật sáng rực màu Neon Hồng khi hát tới từ đó */
.lyric-word.active{
    color:#ff007f;
    text-shadow:
        0 0 5px #ff007f,
        0 0 15px #ff007f,
        0 0 25px #ff007f;
}

/* Trạng thái chữ đã hát qua */
.lyric-word.passed{
    color:#00cfff;
    text-shadow: none;
}

/* Dòng Highlight đặc biệt (STAY INSIDE!) đổi màu vàng */
.highlight .lyric-word.active{
    color:#ffd000;
    text-shadow:
        0 0 5px #ffd000,
        0 0 15px #ffd000,
        0 0 25px #ffd000;
}

.glow-line{
    position:fixed;
    inset:0;
    pointer-events:none;
    background: radial-gradient(circle at center, rgba(255,0,127,.04), transparent 70%);
}
</style>
</head>

const textContainer = document.getElementById("textContainer");
const lyricsContent = document.getElementById("lyricsContent");
const audio = document.getElementById("audio");
const audioInput = document.getElementById("audioInput");
const statusText = document.getElementById("status");
const uploadLabel = document.getElementById("uploadLabel");

let targetTranslateY = 0;
let actualTranslateY = 0;
let db = null;

// Khởi tạo IndexedDB để lưu trữ tệp âm thanh dung lượng lớn dung nạp lâu dài
const request = indexedDB.open("CyberpunkKaraokeDB", 1);
request.onupgradeneeded = (e) => {
    db = e.target.result;
    if (!db.objectStoreNames.contains("audioStore")) {
        db.createObjectStore("audioStore", { keyPath: "id" });
    }
};
request.onsuccess = (e) => {
    db = e.target.result;
    loadAudioFromStorage(); // Tự động nạp lại nếu dữ liệu đã tồn tại sẵn
};
request.onerror = (e) => {
    console.error("IndexedDB Error:", e);
};

function createLyrics(){
    lyricsContent.innerHTML = "";
    lyricsData.forEach((line,lineIndex)=>{
        const lineDiv = document.createElement("div");
        lineDiv.className = "lyric-line";
        if(line.highlight){
            lineDiv.classList.add("highlight");
        }
        lineDiv.id = `line-${lineIndex}`;

        line.words.forEach((word,wordIndex)=>{
            const span = document.createElement("span");
            span.className = "lyric-word";
            span.id = `word-${lineIndex}-${wordIndex}`;
            span.textContent = word.text;
            lineDiv.appendChild(span);
        });
        lyricsContent.appendChild(lineDiv);
    });
}

function updateLyrics(){
    const currentTime = audio.currentTime;
    let activeLineElement = null;

    lyricsData.forEach((line,lineIndex)=>{
        const lineElement = document.getElementById(`line-${lineIndex}`);
        if(!lineElement) return;

        if(currentTime >= line.lineStart && currentTime <= line.lineEnd){
            activeLineElement = lineElement;
            if(!lineElement.classList.contains("active-line")){
                lineElement.classList.add("active-line");
            }

            line.words.forEach((word,wordIndex)=>{
                const wordElement = document.getElementById(`word-${lineIndex}-${wordIndex}`);
                if(!wordElement) return;

                const nextWord = line.words[wordIndex + 1];
                const nextTime = nextWord ? nextWord.time : line.lineEnd;

                if(currentTime >= word.time && currentTime < nextTime){
                    wordElement.className = "lyric-word active";
                }
                else if(currentTime >= nextTime){
                    wordElement.className = "lyric-word passed";
                }
                else{
                    wordElement.className = "lyric-word";
                }
            });
        }
        else{
            lineElement.classList.remove("active-line");
            line.words.forEach((word,wordIndex)=>{
                const wordElement = document.getElementById(`word-${lineIndex}-${wordIndex}`);
                if(!wordElement) return;

                if(currentTime > line.lineEnd){
                    wordElement.className = "lyric-word passed";
                }
                else{
                    wordElement.className = "lyric-word";
                }
            });
        }
    });

    if (activeLineElement) {
        const lineTop = activeLineElement.offsetTop;
        const lineHeight = activeLineElement.offsetHeight;
        const containerHeight = textContainer.clientHeight;

        targetTranslateY = (containerHeight / 2) - (lineTop + (lineHeight / 2));
    }

    actualTranslateY += (targetTranslateY - actualTranslateY) * 0.1;
    lyricsContent.style.transform = `translateY(${actualTranslateY}px)`;

    requestAnimationFrame(updateLyrics);
}

// Hàm lưu dữ liệu tệp vào cơ sở dữ liệu trình duyệt
function saveAudioToStorage(file) {
    if (!db) return;
    const transaction = db.transaction(["audioStore"], "readwrite");
    const store = transaction.objectStore(["audioStore"]);
    const audioData = {
        id: "currentTrack",
        name: file.name,
        blob: file
    };
    store.put(audioData);
}

// Hàm tự động nạp lại bài hát cũ từ bộ nhớ khi tải lại trang
function loadAudioFromStorage() {
    if (!db) return;
    const transaction = db.transaction(["audioStore"], "readonly");
    const store = transaction.objectStore("audioStore");
    const getRequest = store.get("currentTrack");

    getRequest.onsuccess = (e) => {
        const result = e.target.result;
        if (result && result.blob) {
            audio.src = URL.createObjectURL(result.blob);
            statusText.innerHTML = "Đã khôi phục: " + result.name;
            statusText.style.color = "#00e5ff";
            uploadLabel.innerText = "ĐỔI FILE NHẠC";
        }
    };
}

audioInput.addEventListener("change",(e)=>{
    const file = e.target.files[0];
    if(file){
        audio.src = URL.createObjectURL(file);
        statusText.innerHTML = "Đã nạp: " + file.name;
        statusText.style.color = "#00e5ff";
        uploadLabel.innerText = "ĐỔI FILE NHẠC";
        
        targetTranslateY = 0;
        actualTranslateY = 0;
        lyricsContent.style.transform = "translateY(0px)";
        
        saveAudioToStorage(file); // Tiến hành ghi nhớ bài mới vào thiết bị
        audio.play().catch(err => console.log("Hệ thống chờ phát nhạc."));
    }
});

createLyrics();
requestAnimationFrame(updateLyrics);
</script>
